<app-login-navbar></app-login-navbar>
<div class="login-container">
        <p>機械監修アプリ</p>
        <p>Register</p>

        <div class="form">
            <div class="form-group-vertical">
                <label>ユーザーID</label>
                <input type="text"
                (input)="OnRegisterInputUserId($event)"
                (keydown.enter)="register()">
            </div>
            <div class="form-group-vertical">
                <label>ユーザー名</label>
                <input type="text"
                (input)="OnRegisterInputUsername($event)"
                (keydown.enter)="register()">
            </div>
            <div class="form-group-vertical">
                <label>パスワード</label>
                <input type="password"
                (input)="OnRegisterInputPassword($event)"
                (keydown.enter)="register()">
            </div>
        </div>

        <div class="error-message">エラーメッセージ</div>

        <div class="prelogin-btn">
            <div class="btn" (click)="register()">登録</div>
            <div class="btn" routerLink="/login">戻る</div>
        </div>
    </div>
