<app-login-navbar></app-login-navbar>
<div class="login-container">
    <p>機械監修アプリ</p>
    <p>Login</p>

    <form class="form">
        <div class="form-group-vertical">
            <label>ユーザーID</label>
            <input type="text"
            (input)="onLoginInputUserId($event)"
            (keydown.enter)="login()">
        </div>
        <div class="form-group-vertical">
            <label>パスワード</label>
            <input type="password"
            (input)="onLoginInputPassword($event)"
            (keydown.enter)="login()">
        </div>
    </form>

    <div class="error-message">エラーメッセージ</div>

    <div class="prelogin-btn">
        <div class="btn" (click)="login()">ログイン</div>
        <div routerLink="/register" class="btn">登録</div>
    </div>
</div>
